{{- if and .Values.dashboard.enabled .Values.dashboard.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.dashboard.name }}
  namespace: {{ .Values.namespace }}
spec:
  to:
    kind: Service
    name: {{ .Values.dashboard.name }}
  port:
    targetPort: {{ .Values.dashboard.service.port }}
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
